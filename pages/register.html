<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-box">
        <h2>Đăng ký tài khoản</h2>
        <p>Đăng ký tài khoản để sử dụng dịch vụ</p>

        <div class="row">
          <div class="input-group">
            <label>Họ và tên đệm</label>
            <input type="text" />
          </div>

          <div class="input-group">
            <label>Tên</label>
            <input type="text" />
          </div>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="you@company.com" />
        </div>

        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" />
        </div>

        <div class="checkbox">
          <input type="checkbox" />
          <span>Bạn đồng ý với <a href="#">chính sách và điều khoản</a></span>
        </div>

        <button class="btn">Đăng ký</button>

        <p class="login">
          Bạn đã có tài khoản?
          <a href="./login.html">Đăng nhập</a>
        </p>
      </div>
    </div>
  </body>
</html>
