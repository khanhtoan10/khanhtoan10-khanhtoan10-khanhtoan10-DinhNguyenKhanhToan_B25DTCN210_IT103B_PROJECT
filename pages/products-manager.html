<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Study Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/products-manager.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-book-open"></i>
        <div>
          <strong>Study Tracker</strong>
          <p>Quản lý học tập</p>
        </div>
      </div>
      <nav>
        <a href="#"><i class="fa-solid fa-chart-simple"></i> Thống kê</a>
        <a href="#" class="active"
          ><i class="fa-solid fa-list-check"></i> Quản lý môn học</a
        >
        <a href="#"><i class="fa-solid fa-file-lines"></i> Quản lý bài học</a>
      </nav>
    </aside>

    <main>
      <header>
        <i class="fa-solid fa-bars"></i>
        <div class="user">
          <i class="fa-solid fa-bell"></i>
          <i class="fa-solid fa-gear"></i>
          <img src="https://i.pravatar.cc/32" alt="avatar" />
        </div>
      </header>

      <section class="content">
        <div class="head">
          <h2>Môn học</h2>
          <div class="actions">
            <select id="filter">
              <option value="all">Lọc trạng thái</option>
              <option value="active">Đang hoạt động</option>
              <option value="inactive">Ngừng hoạt động</option>
            </select>
            <button class="btn-add">Thêm mới môn học</button>
          </div>
        </div>

        <div class="search">
          <input type="text" id="search" placeholder="Tìm tên môn học..." />
        </div>

        <table>
          <thead>
            <tr>
              <th>Tên môn học</th>
              <th>Trạng thái</th>
              <th>Chức năng</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>

        <div class="pagination">
          <button>1</button>
          <button>2</button>
          <button class="active">3</button>
          <button>4</button>
        </div>
      </section>
    </main>
    <script src="../js/products-manager.js"></script>
  </body>
</html>
