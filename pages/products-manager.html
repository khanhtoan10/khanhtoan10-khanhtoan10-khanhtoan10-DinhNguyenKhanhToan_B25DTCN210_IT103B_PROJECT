<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Study Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/products-manager.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-book-open"></i>
        <div>
          <strong>Study Tracker</strong>
          <p>Quản lý tiến độ học tập</p>
        </div>
      </div>
      <nav>
        <a href="#"><i class="fa-solid fa-chart-simple"></i> Thống kê</a>
        <a href="#" class="active"
          ><i class="fa-solid fa-list-check"></i> Quản lý môn học</a
        >
        <a href="../pages/category-manager.html"
          ><i class="fa-solid fa-file-lines"></i> Quản lý bài học</a
        >
      </nav>
    </aside>

    <main>
      <header>
        <i class="fa-solid fa-bars"></i>
        <div class="user">
          <i class="fa-solid fa-bell"></i>
          <i class="fa-solid fa-circle-question"></i>
          <i class="fa-solid fa-gear"></i>
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4jWHMUO1vdZ83keVYMgqX7jvV17VlWEJkxg&s"
            alt="avatar"
          />
        </div>
      </header>

      <section class="content">
        <div class="head">
          <h2>Môn học</h2>
          <div class="actions">
            <select id="filter">
              <option value="all">Lọc trạng thái</option>
              <option value="active">Đang hoạt động</option>
              <option value="inactive">Ngừng hoạt động</option>
            </select>
            <button class="btn-add">Thêm mới môn học</button>
          </div>
        </div>

        <div class="search">
          <input type="text" id="search" placeholder="Tìm tên môn học..." />
        </div>

        <table>
          <thead>
            <tr>
              <th>Tên môn học <i class="fa-solid fa-arrow-down"></i></th>
              <th>Trạng thái</th>
              <th>Chức năng</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>

        <div class="pagination">
          <button><i class="fa-solid fa-arrow-left"></i></button>
          <button>1</button>
          <button>2</button>
          <button class="active">3</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>7</button>
          <button>...</button>
          <button>20</button>
          <button><i class="fa-solid fa-arrow-right"></i></button>
        </div>
      </section>
    </main>

    <div id="modal" class="modal-container">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-title">Thêm mới môn học</h3>
          <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Tên môn học</label>
            <input
              type="text"
              id="subject-name"
              placeholder="Nhập tên môn học"
            />
            <small id="error-msg" style="color: red; display: none"
              >Tên môn học không được để trống</small
            >
          </div>
          <div class="form-group">
            <label>Trạng thái</label>
            <div class="radio-group">
              <label
                ><input type="radio" name="status" value="active" checked />
                Đang hoạt động</label
              >
              <label
                ><input type="radio" name="status" value="inactive" /> Ngừng
                hoạt động</label
              >
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btn-cancel">Hủy</button>
          <button class="btn-submit" id="btn-save">Thêm</button>
        </div>
      </div>
    </div>

    <div id="delete-modal" class="modal-container">
      <div class="modal-content" style="width: 350px; text-align: center">
        <div class="modal-body">
          <i
            class="fa-solid fa-circle-exclamation"
            style="font-size: 50px; color: #e53e3e; margin-bottom: 15px"
          ></i>
          <h3>Xác nhận xóa?</h3>
          <p style="margin-top: 10px; color: #718096">
            Bạn có chắc chắn muốn xóa môn học này không? Hành động này không thể
            hoàn tác.
          </p>
        </div>
        <div
          class="modal-footer"
          style="justify-content: center; margin-top: 25px"
        >
          <button class="btn-cancel" id="btn-cancel-delete">Hủy</button>
          <button
            class="btn-submit"
            id="btn-confirm-delete"
            style="background-color: #e53e3e"
          >
            Xóa ngay
          </button>
        </div>
      </div>
    </div>
    <script src="../js/products-manager.js"></script>
  </body>
</html>
